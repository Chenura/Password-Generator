<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>🔐 Password Generator Pro</h1>

    <div class="settings">
        <label>Password Length</label>
        <input type="number" id="length" value="12" min="4" max="50">

        <label><input type="checkbox" id="upper" checked> Uppercase</label>
        <label><input type="checkbox" id="lower" checked> Lowercase</label>
        <label><input type="checkbox" id="numbers" checked> Numbers</label>
        <label><input type="checkbox" id="symbols" checked> Symbols</label>
    </div>

    <div class="buttons">
        <button onclick="generatePassword()" class="generate">Generate</button>
        <button onclick="copyPassword()">Copy</button>
        <button onclick="downloadPasswords()" class="download">Download</button>
        <button onclick="clearHistory()" class="clear">Clear History</button>
    </div>

    <div class="output" id="output">Your password will appear here</div>

    <h3>History</h3>
    <ul id="history"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
